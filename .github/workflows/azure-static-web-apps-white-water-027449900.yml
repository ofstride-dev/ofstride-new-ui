name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Debug - Check files after checkout
        run: |
          echo "Current directory: $(pwd)"
          echo "--- Root contents ---"
          ls -la
          echo "--- Looking for lock files ---"
          find . -maxdepth 3 -name "package-lock.json" -o -name "npm-shrinkwrap.json"
          echo "--- Git tracked lock files ---"
          git ls-files | grep -i "package-lock\|npm-shrinkwrap" || echo "No lock files tracked by git"
          echo "--- package.json location ---"
          find . -maxdepth 3 -name "package.json"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # Temporarily disable cache to rule out stale cache issues
          # Re-enable after first successful run: cache: 'npm'

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            echo "Found package-lock.json, running npm ci..."
            npm ci
          else
            echo "WARNING: package-lock.json not found in $(pwd), falling back to npm install..."
            npm install
          fi

      - name: Build Application
        run: npm run build

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WAS_OFSTRIDE_002 }}
          action: "upload"
          app_location: "/"
          output_location: "dist"
          skip_deploy_on_missing_secrets: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WAS_OFSTRIDE_002 }}
          action: "close"
